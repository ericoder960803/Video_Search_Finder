name: "Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Mac (Intel & Apple Silicon via cross-compile or separate runners)
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # Linux
            args: ""
          - platform: "windows-latest" # Windows
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libavcodec-dev libavformat-dev libavutil-dev libswscale-dev librocksdb-dev libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install dependencies (macos only)
        if: matrix.platform == 'macos-latest'
        run: brew install ffmpeg rocksdb

      - name: install dependencies (windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          # 使用 vcpkg 安裝 ffmpeg 比較能讓 CMake 找到
          vcpkg install ffmpeg:x64-windows
          # 將 vcpkg 加入路徑
          echo "CMAKE_PREFIX_PATH=C:/vcpkg/installed/x64-windows" >> $GITHUB_ENV

      - name: Build Core Engine
        shell: bash
        run: |
          cd core_src
          mkdir build && cd build
          
          # Windows 需要指定 vcpkg 工具鏈
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release
          fi
          
          cmake --build . --config Release
          
          # Prepare Sidecar directory
          mkdir -p ../../gui/src-tauri/bin
          
          # Get target triple for naming sidecar
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cp Release/dupe_engine.exe ../../gui/src-tauri/bin/dupe_engine-x86_64-pc-windows-msvc.exe
          elif [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            cp dupe_engine ../../gui/src-tauri/bin/dupe_engine-x86_64-apple-darwin
          else
            cp dupe_engine ../../gui/src-tauri/bin/dupe_engine-x86_64-unknown-linux-gnu
          fi

      - name: install frontend dependencies
        run: cd gui && npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action replaces this with app version
          releaseName: "Video Search Finder v__VERSION__"
          releaseBody: "Automated release from GitHub Actions"
          releaseDraft: true
          prerelease: false
          projectPath: "gui"
          args: ${{ matrix.args }}
